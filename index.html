<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f5f5;
            font-family: sans-serif;
            font-size: 13px;
            color: #222;
        }

        ul.list-view {
            width: 100%;
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        li.list-item {
            width: 100%;
            background: #fff;
        }

        li.list-item:hover {
            background: #f0f0f0;
        }

        .list-item__container {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 12px;
        }

        .list-item__image_container img {
            display: block;
            width: 160px;
            height: 90px;
            object-fit: cover;
            cursor: pointer;
            flex-shrink: 0;
        }

        .list-item__info {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 0;
        }

        .list-item__name {
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .list-item__dirname {
            color: #666;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .list-item__links a {
            color: #0066cc;
            text-decoration: none;
        }

        .list-item__links a:hover {
            text-decoration: underline;
        }

        /* toolbar */
        header {
            position: sticky;
            top: 0;
            background: #fff;
            border-bottom: 1px solid #ddd;
            z-index: 10;
            padding: 6px 12px;
        }

        .toolbar {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        #btnToggleView {
            padding: 4px 14px;
            cursor: pointer;
            border: 1px solid #bbb;
            border-radius: 4px;
            background: #f0f0f0;
            font-size: 13px;
        }

        #btnToggleView:hover {
            background: #e0e0e0;
        }

        /* grid mode */
        ul.list-view.grid-view {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 8px;
            padding: 8px;
        }

        ul.list-view.grid-view li.list-item {
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid #e0e0e0;
        }

        ul.list-view.grid-view .list-item__container {
            flex-direction: column;
            padding: 0;
            gap: 0;
            align-items: stretch;
        }

        ul.list-view.grid-view .list-item__image_container img {
            width: 100%;
            height: 120px;
        }

        ul.list-view.grid-view .list-item__info {
            padding: 6px 8px;
        }

        /* folder item */
        li.list-item--dir {
            cursor: pointer;
        }

        li.list-item--dir .list-item__container {
            gap: 10px;
        }

        li.list-item--dir:hover {
            background: #e8f0fe;
        }

        .list-item__dir-icon {
            font-size: 28px;
            flex-shrink: 0;
        }

        .list-item__dir-count {
            color: #888;
            font-size: 12px;
            margin-left: 4px;
        }

        ul.list-view.grid-view li.list-item--dir {
            display: flex;
            align-items: center;
        }

        ul.list-view.grid-view li.list-item--dir .list-item__container {
            flex-direction: row;
            padding: 12px;
            align-items: center;
        }

        /* breadcrumb */
        #breadcrumb {
            font-size: 13px;
            color: #444;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #btnBack {
            padding: 4px 14px;
            cursor: pointer;
            border: 1px solid #bbb;
            border-radius: 4px;
            background: #f0f0f0;
            font-size: 13px;
        }

        #btnBack:hover:not(:disabled) {
            background: #e0e0e0;
        }

        #btnBack:disabled {
            opacity: 0.4;
            cursor: default;
        }
    </style>
</head>
<body>
    <header>
        <div class="toolbar">
            <button id="btnBack" disabled>&#8593; 상위</button>
            <span id="breadcrumb"></span>
            <button id="btnToggleView">List</button>
        </div>
    </header>
    <main>
        <div id="app">
        </div>    
    </main>
    <footer></footer>
    <script src="snapshots.js"></script>
    <script src="app.js"></script>
</body>
</html>
